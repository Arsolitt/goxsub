# Release workflow for goxsub
#
# Triggered on:
#   - Push of semantic version tags (v1.0.0, v0.1.0, etc.)
#   - Manual dispatch via GitHub UI
#
# This workflow:
#   1. Builds binaries for all supported platforms via GoReleaser
#   2. Creates SHA256 checksums
#   3. Uploads release artifacts to GitHub

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: always()
    steps:
      - name: Verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Verifying release for tag: $TAG"

          sleep 10

          gh release view "$TAG" --repo "${{ github.repository }}" --json assets,tagName,name

          echo "Release verification complete"
